backend:
  name: github
  repo: guineztom/GZDESIGNS
  branch: main
  
media_folder: "images"
public_folder: "/images"

collections:
  - name: "site"
    label: "Contenu du site"
    files:

      - name: "hero"
        label: "Section Hero"
        file: "content/hero.json"
        fields:
          - {label: "Tag", name: "tag", widget: "string"}
          - {label: "Titre ligne 1", name: "h1_1", widget: "string"}
          - {label: "Titre ligne 2", name: "h1_2", widget: "string"}
          - {label: "Titre ligne 3 (violet)", name: "h1_3", widget: "string"}
          - {label: "Sous-titre", name: "subline", widget: "text"}
          - {label: "Badge 1 titre", name: "badge1_title", widget: "string"}
          - {label: "Badge 1 sous-titre", name: "badge1_sub", widget: "string"}
          - {label: "Badge 2 titre", name: "badge2_title", widget: "string"}
          - {label: "Badge 2 sous-titre", name: "badge2_sub", widget: "string"}

      - name: "pricing"
        label: "Tarifs"
        file: "content/pricing.json"
        fields:
          - {label: "Titre section", name: "title", widget: "string"}
          - {label: "Sous-titre", name: "subtitle", widget: "text"}
          - label: "Formule Refonte"
            name: "plan1"
            widget: "object"
            fields:
              - {label: "Nom", name: "name", widget: "string"}
              - {label: "Prix (€)", name: "price", widget: "number"}
              - {label: "Description", name: "desc", widget: "text"}
          - label: "Formule Création"
            name: "plan2"
            widget: "object"
            fields:
              - {label: "Nom", name: "name", widget: "string"}
              - {label: "Prix (€)", name: "price", widget: "number"}
              - {label: "Description", name: "desc", widget: "text"}
          - label: "Formule Sur-mesure"
            name: "plan3"
            widget: "object"
            fields:
              - {label: "Nom", name: "name", widget: "string"}
              - {label: "Prix (€)", name: "price", widget: "number"}
              - {label: "Description", name: "desc", widget: "text"}
          - label: "Modifications ponctuelles"
            name: "maint"
            widget: "list"
            fields:
              - {label: "Nom", name: "name", widget: "string"}
              - {label: "Prix (€)", name: "price", widget: "number"}
              - {label: "Description", name: "desc", widget: "text"}

      - name: "faq"
        label: "FAQ"
        file: "content/faq.json"
        fields:
          - label: "Questions / Réponses"
            name: "items"
            widget: "list"
            fields:
              - {label: "Question", name: "q", widget: "string"}
              - {label: "Réponse", name: "a", widget: "text"}

      - name: "contact"
        label: "Contact"
        file: "content/contact.json"
        fields:
          - {label: "Titre", name: "title", widget: "string"}
          - {label: "Sous-titre", name: "subtitle", widget: "text"}
          - {label: "ID Formspree", name: "formspree_id", widget: "string"}
          - label: "Pills"
            name: "pills"
            widget: "list"
            field: {label: "Texte", name: "text", widget: "string"}

      - name: "meta"
        label: "SEO"
        file: "content/meta.json"
        fields:
          - {label: "Titre page", name: "title", widget: "string"}
          - {label: "Meta description", name: "description", widget: "text"}
          - {label: "URL du site", name: "site_url", widget: "string"}
